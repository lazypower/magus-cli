version: 1

file_roots:
  - /etc/magus.d
  - /etc/systemd/system
  - /etc/containers/systemd
  - /var/lib/magus
  - /var/data

# Unit patterns match unit NAMES (e.g. magus-foo.service). Drop-ins are gated by
# their parent unit's pattern — a drop-in to magus-foo.service is covered by
# "magus-*" — so there is no separate drop-in pattern here.
unit_patterns:
  - "magus-*"

deny:
  paths:
    - /etc/shadow
    - /etc/passwd
    - /etc/sudoers
    - /etc/sudoers.d/*
  units:
    - "sshd.*"
    - "systemd-*"
